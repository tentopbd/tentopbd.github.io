<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOEHYBE এর সাইট</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
    h1 { font-size: 2.5rem; margin-bottom: 10px; color: #38bdf8; }
    p { font-size: 1.2rem; color: #94a3b8; margin-bottom: 20px; }
    .btn { background: #38bdf8; color: #0f172a; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.2s; display: inline-block; }
    .btn:hover { background: #0ea5e9; }
    .card { background: #1e293b; padding: 30px; border-radius: 16px; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <h1>স্বাগতম!</h1>
    <p>এটা আমার GitHub Pages সাইট। আমি এখন এখানে যা ইচ্ছা বানাতে পারি 🚀</p>
    <a href="https://github.com/nuralamsiddiki" class="btn">আমার GitHub</a>
  </div>
</body>
</html>
