<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শেখ বাড়ি</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background: #f5f5f5;
            line-height: 1.8;
        }
        h1 {
            color: #2e7d32;
            font-size: 36px;
            margin-bottom: 20px;
        }
        h2 {
            color: #388e3c;
            font-size: 24px;
            margin-top: 30px;
        }
        p {
            font-size: 18px;
            color: #333;
            max-width: 600px;
            margin: 10px auto;
        }
        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 650px;
            margin: 20px auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>শেখ বাড়ি</h1>
    
    <div class="box">
        <h2>আমাদের সম্পর্কে</h2>
        <p>আমি একজন ক্ষুদ্র উদ্যোক্তা। এখানে হাঁস, মুরগী ও কবুতর পালন করা হয়।</p>
        <p>যত্ন সহকারে পালন করা হয় এবং প্রয়োজনীয় ভ্যাকসিন প্রদান করা হয়।</p>
    </div>

    <div class="box">
        <h2>যোগাযোগ</h2>
        <p>যোগাযোগের জন্য কল করুন</p>
    </div>

    <div class="box">
        <h2>Privacy & Contract</h2>
        <p>আপনার তথ্যের গোপনীয়তা আমরা রক্ষা করি।</p>
        <p>যেকোনো চুক্তির জন্য সরাসরি যোগাযোগ করুন।</p>
    </div>
</body>
</html>
