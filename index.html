<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>শেখ নূর আলম সিদ্দিকী - Tentop Shop BD</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: auto;
    }
    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #4CAF50;
      object-fit: cover;
    }
    h1 {
      color: #263238;
      margin: 10px 0 5px;
      font-size: 26px;
    }
    .subtitle {
      color: #4CAF50;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h3 {
      color: #4CAF50;
      margin-top: 0;
    }
    .btn {
      display: block;
      margin: 10px 0;
      padding: 14px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }
    .btn-phone { background: #2e7d32; }
    .btn-whatsapp { background: #25D366; }
    .btn-facebook { background: #1877F2; }
    .btn-youtube { background: #FF0000; }
    .btn-tiktok { background: #000; }
    .product {
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- ১. প্রোফাইল -->
    <img src="https://i.ibb.co/HphHBkRF/photo.jpg" alt="Profile" class="profile-img">
    <h1>শেখ নূর আলম সিদ্দিকী</h1>
    <p class="subtitle">Tentop Shop BD</p>

    <!-- ২. আমাদের সম্পর্কে -->
    <div class="card">
      <h3>আমাদের সম্পর্কে</h3>
      <p>আমি একজন ক্ষুদ্র উদ্যোক্তা।<br>
      এখানে হাঁস, মুরগী ও কবুতর পালন করা হয়।</p>
    </div>

    <!-- ৩. যোগাযোগ - লিংকগুলো এখানে -->
    <div class="card">
      <h3>যোগাযোগ</h3>
      
      <a href="tel:01725313210" class="btn btn-phone">📞 ফোন করুন</a>
      
      <a href="https://wa.me/8801725313210" class="btn btn-whatsapp">💬 WhatsApp এ মেসেজ দিন</a>
      
      <a href="https://facebook.com/yourprofile" class="btn btn-facebook">📘 Facebook Profile</a>
      
      <a href="https://facebook.com/yourpage" class="btn btn-facebook">📄 Facebook Page</a>
      
      <a href="https://youtube.com/yourchannel" class="btn btn-youtube">▶️ YouTube Channel</a>
      
      <a href="https://tiktok.com/@yourid" class="btn btn-tiktok">🎵 TikTok</a>
    </div>

    <!-- ৪. প্রোডাক্ট -->
    <div class="card product">
      <h3>প্রোডাক্ট</h3>
      <p><b>স্টক:</b> ২ পিচ আছে</p>
      <p style="font-size:22px; color:#d32f2f;"><b>দাম:</b> 5500 টাকা</p>
      
      <a href="https://wa.me/8801725313210?text=আমি DC Air Pump HZ-060 5500 টাকায় নিতে চাই" class="btn btn-whatsapp">
        💬 WhatsApp এ অর্ডার করো
      </a>
    </div>

  </div>
</body>
</html>
